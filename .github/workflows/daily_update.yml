name: Daily Price Update

on:
  schedule:
    - cron: '0 6 * * 1-5'   # 06:00 UTC, Mon–Fri
  workflow_dispatch:           # allow manual trigger from the Actions tab

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Restore SQLite cache
        uses: actions/cache@v4
        with:
          path: scripts/prices.db
          key: prices-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            prices-db-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch prices and compute asset params
        run: python scripts/fetch_prices.py

      - name: Commit and push updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/prices.json public/asset_params.json
          git diff --staged --quiet && echo "No changes – already up to date." && exit 0
          git commit -m "chore: update prices $(date -u +%Y-%m-%d)"
          git push
